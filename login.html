<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Chinese Heritage</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="style.css" />
    <style>
      .auth-container {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(-45deg, #8B0000, #1a0000, #3d0000, #000000);
        background-size: 400% 400%;
        animation: gradient 15s ease infinite;
        padding: 40px 20px;
      }
      
      .auth-card {
        background: rgba(10, 0, 0, 0.95);
        border-radius: 24px;
        padding: 48px;
        max-width: 500px;
        width: 100%;
        border: 1px solid rgba(212, 175, 55, 0.25);
        box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(12px);
      }
      
      .auth-header {
        text-align: center;
        margin-bottom: 40px;
      }
      
      .auth-logo {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        font-family: "Cinzel", serif;
        font-size: 24px;
        font-weight: 700;
        color: #D4AF37;
        margin-bottom: 16px;
      }
      
      .auth-title {
        font-family: "Cinzel", serif;
        font-size: 32px;
        font-weight: 700;
        color: white;
        margin-bottom: 8px;
      }
      
      .auth-subtitle {
        color: rgba(255, 255, 255, 0.7);
        font-family: "Playfair Display", serif;
        font-size: 16px;
      }
      
      .user-type-selector {
        display: flex;
        gap: 12px;
        margin-bottom: 32px;
        background: rgba(255, 255, 255, 0.05);
        padding: 4px;
        border-radius: 12px;
        border: 1px solid rgba(212, 175, 55, 0.2);
      }
      
      .user-type-btn {
        flex: 1;
        padding: 12px;
        background: transparent;
        border: none;
        border-radius: 8px;
        color: rgba(255, 255, 255, 0.7);
        font-family: "Poppins", sans-serif;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }
      
      .user-type-btn.active {
        background: linear-gradient(135deg, #BB1E1E, #8B0000);
        color: #FFD700;
      }
      
      .user-type-btn:hover:not(.active) {
        background: rgba(255, 255, 255, 0.1);
        color: white;
      }
      
      .form-group {
        margin-bottom: 24px;
      }
      
      .form-label {
        display: block;
        margin-bottom: 8px;
        color: #D4AF37;
        font-weight: 500;
        font-family: "Poppins", sans-serif;
      }
      
      .form-input {
        width: 100%;
        padding: 12px 16px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(212, 175, 55, 0.3);
        border-radius: 12px;
        color: white;
        font-family: "Poppins", sans-serif;
        font-size: 16px;
        transition: all 0.3s ease;
      }
      
      .form-input:focus {
        outline: none;
        border-color: #D4AF37;
        background: rgba(255, 255, 255, 0.12);
      }
      
      .form-input::placeholder {
        color: rgba(255, 255, 255, 0.4);
      }
      
      .remember-forgot {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 24px;
      }
      
      .remember-me {
        display: flex;
        align-items: center;
        gap: 8px;
        color: rgba(255, 255, 255, 0.7);
        font-family: "Poppins", sans-serif;
        font-size: 14px;
      }
      
      .remember-me input[type="checkbox"] {
        accent-color: #D4AF37;
      }
      
      .forgot-link {
        color: #D4AF37;
        text-decoration: none;
        font-family: "Poppins", sans-serif;
        font-size: 14px;
        transition: color 0.3s ease;
      }
      
      .forgot-link:hover {
        color: #FFD700;
      }
      
      .auth-divider {
        display: flex;
        align-items: center;
        margin: 32px 0;
        gap: 16px;
      }
      
      .auth-divider::before,
      .auth-divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: rgba(212, 175, 55, 0.2);
      }
      
      .auth-divider span {
        color: rgba(255, 255, 255, 0.5);
        font-size: 14px;
      }
      
      .social-buttons {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      
      .social-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        padding: 12px 20px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.05);
        color: white;
        text-decoration: none;
        font-family: "Poppins", sans-serif;
        font-weight: 500;
        transition: all 0.3s ease;
        cursor: pointer;
      }
      
      .social-btn:hover {
        background: rgba(255, 255, 255, 0.1);
        transform: translateY(-2px);
      }
      
      .social-btn.google:hover {
        border-color: #4285f4;
        background: rgba(66, 133, 244, 0.1);
      }
      
      .social-btn.wechat:hover {
        border-color: #07c160;
        background: rgba(7, 193, 96, 0.1);
      }
      
      .auth-footer {
        text-align: center;
        margin-top: 32px;
        padding-top: 24px;
        border-top: 1px solid rgba(212, 175, 55, 0.2);
      }
      
      .auth-footer p {
        color: rgba(255, 255, 255, 0.7);
        font-family: "Poppins", sans-serif;
      }
      
      .auth-footer a {
        color: #D4AF37;
        text-decoration: none;
        font-weight: 500;
      }
      
      .auth-footer a:hover {
        color: #FFD700;
      }
      
      .btn-primary {
        width: 100%;
        padding: 14px 24px;
        background: linear-gradient(135deg, #BB1E1E, #8B0000);
        color: #FFD700;
        border: none;
        border-radius: 12px;
        font-family: "Poppins", sans-serif;
        font-weight: 600;
        font-size: 16px;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 4px 15px rgba(187, 30, 30, 0.3);
      }
      
      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(187, 30, 30, 0.5);
        background: linear-gradient(135deg, #d42020, #a00000);
      }
      
      .back-to-home {
        position: absolute;
        top: 20px;
        left: 20px;
        display: flex;
        align-items: center;
        gap: 8px;
        color: #D4AF37;
        text-decoration: none;
        font-family: "Poppins", sans-serif;
        font-weight: 500;
        transition: all 0.3s ease;
      }
      
      .back-to-home:hover {
        color: #FFD700;
        transform: translateX(-4px);
      }
      
      @keyframes gradient {
        0%   { background-position: 0% 50%; }
        50%  { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }
    </style>
  </head>
  <body>
    <div class="auth-container">
      <a href="undex.html" class="back-to-home">
        <i class="fas fa-arrow-left"></i>
        Back to Home
      </a>
      
      <div class="auth-card">
        <div class="auth-header">
          <div class="auth-logo">
            <span>🏯</span>
            <span>Chinese-Heritage</span>
          </div>
          <h1 class="auth-title">Welcome Back</h1>
          <p class="auth-subtitle">Sign in to continue your journey</p>
        </div>
        
        <div class="user-type-selector">
          <button class="user-type-btn active" onclick="selectUserType('user')" id="userBtn">
            <i class="fas fa-user"></i>
            User
          </button>
          <button class="user-type-btn" onclick="selectUserType('admin')" id="adminBtn">
            <i class="fas fa-user-shield"></i>
            Admin
          </button>
        </div>
        
        <form id="loginForm">
          <div class="form-group">
            <label class="form-label" for="email">Email Address</label>
            <input type="email" id="email" class="form-input" placeholder="Enter your email" required>
          </div>
          
          <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <input type="password" id="password" class="form-input" placeholder="Enter your password" required>
          </div>
          
          <div class="remember-forgot">
            <label class="remember-me">
              <input type="checkbox" id="remember">
              Remember me
            </label>
            <a href="#" class="forgot-link">Forgot password?</a>
          </div>
          
          <button type="submit" class="btn-primary">
            <i class="fas fa-sign-in-alt"></i>
            Sign In
          </button>
        </form>
        
        <div class="auth-divider">
          <span>OR SIGN IN WITH</span>
        </div>
        
        <div class="social-buttons">
          <button class="social-btn google" onclick="signInWithGoogle()">
            <i class="fab fa-google"></i>
            Continue with Google
          </button>
          
          <button class="social-btn wechat" onclick="signInWithWeChat()">
            <i class="fab fa-weixin"></i>
            Continue with WeChat
          </button>
        </div>
        
        <div class="auth-footer">
          <p>Don't have an account? <a href="signup.html">Sign Up</a></p>
        </div>
      </div>
    </div>
    
    <script src="api-client.js"></script>
    <script src="user-manager.js"></script>
    <script>
      let currentUserType = 'user';
      
      function selectUserType(type) {
        currentUserType = type;
        
        // Update button states
        document.getElementById('userBtn').classList.toggle('active', type === 'user');
        document.getElementById('adminBtn').classList.toggle('active', type === 'admin');
        
        // Update placeholder text based on user type
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        
        if (type === 'admin') {
          emailInput.placeholder = 'Enter admin email';
          passwordInput.placeholder = 'Enter admin password';
        } else {
          emailInput.placeholder = 'Enter your email';
          passwordInput.placeholder = 'Enter your password';
        }
      }
      
      document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const remember = document.getElementById('remember').checked;
        
        // Use user manager to login
        const result = window.userManager.login(email, password, currentUserType);
        
        if (result.success) {
          // Save remember me preference
          if (remember) {
            localStorage.setItem('rememberUser', email);
          } else {
            localStorage.removeItem('rememberUser');
          }
          
          alert(`\u2705 ${result.message}\n\nLogin successful!\nUser Type: ${result.userType}\nName: ${result.user.fullName}\nEmail: ${result.user.email}\n\nWelcome to Chinese Heritage!`);
          
          // Redirect based on user type
          if (result.userType === 'admin') {
            window.location.href = 'admin-dashboard.html';
          } else {
            window.location.href = 'index.html';
          }
        } else {
          alert(`\u274c Login Failed\n\n${result.message}`);
        }
      });
      
      function signInWithGoogle() {
        const userTypeText = currentUserType === 'admin' ? 'Admin' : 'User';
        alert(`\u1F517 Google Sign In\n\nThis would connect to Google OAuth API.\n\n${userTypeText} authenticated via Google!`);
        
        // Redirect based on user type
        if (currentUserType === 'admin') {
          window.location.href = 'admin-dashboard.html';
        } else {
          window.location.href = 'index.html';
        }
      }
      
      function signInWithWeChat() {
        const userTypeText = currentUserType === 'admin' ? 'Admin' : 'User';
        
        // Firebase WeChat login (free solution)
        alert(`💬 WeChat Sign In (Firebase)\\n\\n🔥 FREE Solution Available!\\n\\nTo enable real WeChat login for FREE:\\n\\n1. Create Firebase account: console.firebase.google.com\\n2. Enable WeChat Authentication\\n3. Add Firebase SDK to your website\\n\\n📋 See firebase-auth.html for complete setup guide\\n\\n✅ Benefits:\\n- $0/month (free tier)\\n- No WeChat platform fees\\n- Real WeChat authentication\\n- Professional security\\n\\n${userTypeText} will be authenticated via WeChat!`);
      }
      
      // Check for remembered user on page load
      window.addEventListener('load', function() {
        const rememberedUser = localStorage.getItem('rememberUser');
        if (rememberedUser) {
          document.getElementById('email').value = rememberedUser;
          document.getElementById('remember').checked = true;
        }
      });
    </script>
  </body>
</html>
